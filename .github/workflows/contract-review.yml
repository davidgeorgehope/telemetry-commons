name: telemetry-contract-review
on: pull_request
jobs:
  review:
    runs-on: ubuntu-latest
    continue-on-error: true # advisory by design — never the merge gate
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
      - name: Contract review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          cursor-agent -f -p "Review this PR's diff against
          .cursor/rules/business-telemetry.mdc and otel-mechanics.mdc.
          Follow helper-method indirection the static gate cannot.
          Report violations with file:line and a suggested fix.
          Do not modify code."
